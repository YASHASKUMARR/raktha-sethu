<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raktha Sethu | 18+ Hero Directory</title>
    <style>
        :root {
            --primary-red: #8B0000;
            --soft-red: #D32F2F;
            --dark-charcoal: #1A1A1A;
            --snow-white: #FFFAFA;
            --call-green: #2e7d32;
            --wa-green: #25D366;
            --sms-blue: #0277bd;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--snow-white); color: var(--dark-charcoal); }

        header {
            background: linear-gradient(135deg, var(--primary-red), #4a0000);
            padding: 40px 20px; text-align: center; color: white;
            clip-path: polygon(0 0, 100% 0, 100% 95%, 0% 100%);
        }

        .main-section { max-width: 1200px; margin: -20px auto 60px; padding: 0 20px; }
        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        
        .portal-card {
            background: white; padding: 30px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
        }

        .btn {
            display: inline-block; padding: 14px 25px; background: var(--dark-charcoal);
            color: white; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-top: 10px;
        }

        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }

        .modal-content {
            background: white; margin: 1vh auto; padding: 25px; border-radius: 25px;
            width: 95%; max-width: 850px; height: 96vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #resultsList, #stockResults {
            flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; 
            margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px solid #eee;
        }

        .result-item {
            background: white; margin-bottom: 20px; padding: 20px;
            border-left: 12px solid var(--primary-red); border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); position: relative;
        }

        .phone-display {
            background: #fff5f5; border: 2px dashed var(--primary-red);
            padding: 12px; border-radius: 10px; margin: 12px 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .phone-number { color: var(--primary-red); font-size: 1.6rem; font-weight: 900; }

        .status-badge {
            position: absolute; top: 15px; right: 15px; padding: 5px 15px; 
            border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }
        .status-eligible { background: #e8f5e9; color: #2e7d32; }
        .status-resting { background: #fff3e0; color: #ef6c00; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .close-btn { float: right; font-size: 45px; cursor: pointer; color: #f00; font-weight: bold; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; color: var(--primary-red); }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; }
        
        .age-error { color: #d32f2f; font-size: 0.85rem; margin-top: 5px; display: none; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary-red); color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <h1>Raktha Sethu</h1>
    <div>🌍 <span id="count">...</span> Total Heroes</div>
</header>

<main class="main-section">
    <div class="portal-grid">
        <div class="portal-card"><h3>REGISTER</h3><button class="btn" onclick="openModal('donorModal')">Be a Hero</button></div>
        <div class="portal-card"><h3>FIND DONORS</h3><button class="btn" style="background: var(--soft-red);" onclick="openModal('receiverModal')">Search All</button></div>
        <div class="portal-card"><h3>BLOOD BANKS</h3><button class="btn" style="background: #333;" onclick="openModal('stockModal')">Check Stock</button></div>
    </div>
</main>

<div id="receiverModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('receiverModal')">&times;</span>
        <h2>Search Results</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="form-group"><label>Group</label><select id="sGroup"><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option><option>AB-</option></select></div>
            <div class="form-group"><label>City</label><input type="text" id="sCity" placeholder="City name..."></div>
        </div>
        <button class="btn" id="searchBtn" style="background: var(--primary-red);">Find Every Match</button>
        <div id="resultsList"><p style="text-align:center;">Enter details and click search.</p></div>
    </div>
</div>

<div id="stockModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('stockModal')">&times;</span>
        <h2>Bank Stock List</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
            <select id="invSearchGroup"><option value="ALL">All Groups</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option></select>
            <input type="text" id="invSearchCity" placeholder="Filter City...">
        </div>
        <div id="stockResults">
            <table>
                <thead><tr><th>Bank</th><th>Grp</th><th>Qty</th><th>Phone</th></tr></thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="donorModal" class="modal">
    <div class="modal-content" style="height: auto; max-height: 94vh; overflow-y: auto;">
        <span class="close-btn" onclick="closeModal('donorModal')">&times;</span>
        <div id="donorFormDiv">
            <h2>Hero Registration</h2>
            <form id="donorForm">
                <div class="form-group"><label>Full Name</label><input type="text" id="dName" required></div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="form-group"><label>Age</label>
                        <input type="number" id="dAge" placeholder="Min 18" required>
                        <div id="ageError" class="age-error">⚠️ You must be at least 18 to donate.</div>
                    </div>
                    <div class="form-group"><label>Blood Group</label><select id="dGroup"><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option><option>AB-</option></select></div>
                </div>

                <div class="form-group"><label>City</label><input type="text" id="dCity" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="dPhone" required></div>
                <div class="form-group"><label>Last Donation Date</label><input type="date" id="dLastDate"></div>
                <button type="submit" class="btn">Register as Hero</button>
            </form>
        </div>
        <div id="donorSuccess" style="display:none; text-align:center; padding: 30px;"><h2>💖 Registered! You're a Life Saver.</h2></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMB_64CilXk7emYV8dzZ1fTGliE6S0w7o",
        authDomain: "raktha-sethu-a7284.firebaseapp.com",
        projectId: "raktha-sethu-a7284",
        storageBucket: "raktha-sethu-a7284.firebasestorage.app",
        messagingSenderId: "562792345820",
        appId: "1:562792345820:web:d6c45f897c096bb2188419"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function refreshCount() {
        const snap = await getCountFromServer(collection(db, "donors"));
        document.getElementById("count").innerText = snap.data().count;
    }
    refreshCount();

    // DONOR SEARCH
    document.getElementById("searchBtn").addEventListener("click", async () => {
        const group = document.getElementById("sGroup").value;
        const citySearch = document.getElementById("sCity").value.toLowerCase().trim();
        const list = document.getElementById("resultsList");
        list.innerHTML = "Searching...";
        
        const q = query(collection(db, "donors"), where("group", "==", group));
        const snap = await getDocs(q);
        list.innerHTML = "";
        let total = 0;

        snap.forEach(doc => {
            const d = doc.data();
            if (citySearch === "" || (d.city || "").toLowerCase().includes(citySearch)) {
                total++;
                const ready = checkReady(d.lastDonated);
                list.innerHTML += `
                    <div class="result-item">
                        <span class="status-badge ${ready.ok ? 'status-eligible' : 'status-resting'}">${ready.ok ? 'READY' : ready.msg}</span>
                        <strong>${d.name.toUpperCase()} (${d.age || 'N/A'})</strong><br>
                        <span>📍 ${d.city.toUpperCase()}</span>
                        <div class="phone-display"><span class="phone-number">${d.phone}</span><small onclick="copyNum('${d.phone}')" style="cursor:pointer; text-decoration:underline;">Copy</small></div>
                        <div class="action-btns">
                            <a href="tel:${d.phone}" class="btn" style="background:var(--call-green); padding:10px; font-size:0.7rem;">Call</a>
                            <a href="https://wa.me/${d.phone}" target="_blank" class="btn" style="background:var(--wa-green); padding:10px; font-size:0.7rem;">WA</a>
                            <a href="sms:${d.phone}" class="btn" style="background:var(--sms-blue); padding:10px; font-size:0.7rem;">SMS</a>
                        </div>
                    </div>`;
            }
        });
        if (total === 0) list.innerHTML = "No matching donors found.";
        else list.insertAdjacentHTML('afterbegin', `<p style='text-align:center;'>Found ${total} matches</p>`);
    });

    // REGISTRATION WITH AGE CHECK
    document.getElementById("donorForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const age = parseInt(document.getElementById("dAge").value);
        const err = document.getElementById("ageError");

        if (age < 18) {
            err.style.display = "block";
            return;
        } else {
            err.style.display = "none";
        }

        await addDoc(collection(db, "donors"), {
            name: document.getElementById("dName").value,
            age: age,
            group: document.getElementById("dGroup").value,
            city: document.getElementById("dCity").value.toLowerCase().trim(),
            phone: document.getElementById("dPhone").value,
            lastDonated: document.getElementById("dLastDate").value || null
        });
        document.getElementById("donorFormDiv").style.display = "none";
        document.getElementById("donorSuccess").style.display = "block";
        refreshCount();
    });

    // BANK STOCK LOGIC
    let allStock = [];
    window.loadStock = async () => {
        const snap = await getDocs(collection(db, "stock"));
        allStock = [];
        snap.forEach(doc => allStock.push(doc.data()));
        renderBanks(allStock);
    };

    function renderBanks(data) {
        const tbody = document.getElementById("stockTableBody");
        tbody.innerHTML = "";
        data.forEach(d => { tbody.innerHTML += `<tr><td>${d.bankName}</td><td>${d.group}</td><td>${d.units}</td><td style="font-weight:bold; color:var(--primary-red);">${d.phone}</td></tr>`; });
    }

    const filterBanks = () => {
        const g = document.getElementById("invSearchGroup").value;
        const c = document.getElementById("invSearchCity").value.toLowerCase().trim();
        renderBanks(allStock.filter(x => (g === "ALL" || x.group === g) && (c === "" || (x.city && x.city.includes(c)))));
    };

    document.getElementById("invSearchGroup").addEventListener("change", filterBanks);
    document.getElementById("invSearchCity").addEventListener("keyup", filterBanks);

    function checkReady(d) {
        if(!d) return {ok:true};
        const diff = Math.floor((new Date() - new Date(d)) / (86400000));
        return diff >= 90 ? {ok:true} : {ok:false, msg: `${90-diff}d left`};
    }

    window.copyNum = (n) => { navigator.clipboard.writeText(n); alert("Copied!"); };
    window.openModal = (id) => { document.getElementById(id).style.display = "block"; if(id==='stockModal') loadStock(); };
    window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };
</script>
</body>
</html>
